<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MARK. — Trading Journal</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="page-head">
      <div>
        <h1>Journal</h1>
        <div class="sub">Log every trade, grade the setup, build your edge.</div>
      </div>
      <div class="page-head-actions">
        <button class="btn btn-primary" id="btn-add-trade">+ Add trade</button>
      </div>
    </div>

    <div class="ticker" id="ticker-mount"></div>

    <div class="grid-2">
      <div>
        <div class="stat-grid" id="stat-grid"></div>

        <div id="tag-filter-mount"></div>

        <div class="card">
          <div class="page-head" style="margin-bottom:16px;">
            <div>
              <h3 class="card-title">Trade log</h3>
              <div class="card-sub" id="log-count">0 trades</div>
            </div>
            <div class="filter-bar" style="margin:0;">
              <select id="filter-strategy"><option value="">All strategies</option></select>
              <select id="filter-grade"><option value="">All grades</option><option value="A">A setups</option><option value="B">B setups</option><option value="C">C setups</option><option value="D">D setups</option></select>
              <select id="filter-outcome"><option value="">All outcomes</option><option value="Win">Win</option><option value="Loss">Loss</option><option value="Breakeven">Breakeven</option></select>
            </div>
          </div>
          <div class="table-wrap">
            <table class="tj">
              <thead>
                <tr>
                  <th>Date</th><th>Symbol</th><th>Dir</th><th>Strategy</th><th>Grade</th><th>Outcome</th><th>P&amp;L</th><th>Proof</th><th></th>
                </tr>
              </thead>
              <tbody id="trades-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <aside>
        <div id="memory-mount"></div>
        <div id="discipline-mount"></div>
        <div id="correlation-mount"></div>
      </aside>
    </div>
  </main>
</div>

<div id="toast-wrap" class="toast-wrap"></div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="js/db.js"></script>
<script src="js/nav.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
