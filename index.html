<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MARK. — Trading Journal</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .heatmap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .heatmap-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  .heatmap-header .card-title { margin: 0; }
  .heatmap-header .card-sub   { margin: 2px 0 0; font-size: 12px; }
  .live-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--bull); font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase;
  }
  .live-dot::before {
    content: '';
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: var(--bull);
    animation: pulse-dot 1.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1);   }
    50%       { opacity: .4; transform: scale(.7); }
  }
  .heatmap-body {
    padding: 0;
    height: 340px;
    position: relative;
  }
  .heatmap-body iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }
  .heatmap-footer {
    padding: 6px 18px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-faint);
  }
  .heatmap-footer a {
    color: var(--text-faint);
    text-decoration: none;
  }
  .heatmap-footer a:hover { color: var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="page-head">
      <div>
        <h1>Journal</h1>
        <div class="sub">Log every trade, grade the setup, build your edge.</div>
      </div>
      <div class="page-head-actions">
        <button class="btn btn-primary" id="btn-add-trade">+ Add trade</button>
      </div>
    </div>

    <div class="ticker" id="ticker-mount"></div>

    <div class="stat-grid" id="stat-grid"></div>

    <!-- Forex Heat Map -->
    <div class="heatmap-card">
      <div class="heatmap-header">
        <div>
          <div class="card-title">Forex Heat Map</div>
          <div class="card-sub">Live currency strength — spot the strongest vs weakest pairs at a glance</div>
        </div>
        <div class="live-dot">Live</div>
      </div>
      <div class="heatmap-body">
        <iframe
          src="https://widgets.myfxbook.com/widgets/heat-map.html?symbols=8,9,10,11,12,6,13,14,15,17,7,1,4,2,28,5,29,3,50,51&type=0"
          scrolling="no"
          allowtransparency="true">
        </iframe>
      </div>
      <div class="heatmap-footer">
        Powered by <a href="https://www.myfxbook.com" target="_blank" rel="noopener">Myfxbook.com</a>
      </div>
    </div>

    <div class="card">
      <div class="page-head" style="margin-bottom:16px;">
        <div>
          <h3 class="card-title">Trade log</h3>
          <div class="card-sub" id="log-count">0 trades</div>
        </div>
        <div class="filter-bar" style="margin:0;">
          <select id="filter-strategy"><option value="">All strategies</option></select>
          <select id="filter-grade"><option value="">All grades</option><option value="A">A setups</option><option value="B">B setups</option><option value="C">C setups</option><option value="D">D setups</option></select>
          <select id="filter-outcome"><option value="">All outcomes</option><option value="Win">Win</option><option value="Loss">Loss</option><option value="Breakeven">Breakeven</option></select>
        </div>
      </div>
      <div class="table-wrap">
        <table class="tj">
          <thead>
            <tr>
              <th>Date</th><th>Symbol</th><th>Dir</th><th>Strategy</th><th>Grade</th><th>Outcome</th><th>P&amp;L</th><th>Proof</th><th></th>
            </tr>
          </thead>
          <tbody id="trades-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="toast-wrap" class="toast-wrap"></div>

<script src="js/db.js"></script>
<script src="js/nav.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
